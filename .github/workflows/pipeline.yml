name: Data Pipeline

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated

      - name: Set up Python
        uses: actions/setup-python@v5   # ✅ updated
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python scripts/report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: output/report.csv
